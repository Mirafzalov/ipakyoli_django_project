{% load static %}
{% load digital_store_tags %}
{% get_categories as cats %}

<div class="header_nav_menu">
        <div class="container">
            <div class="nav__menu">
                <ul class="nav__category">

                    {% for cat in cats %}
                    <li><a href="{{ cat.get_absolute_url }}" class="category"><img src="{{ cat.get_icon }}" alt="">
                        <p class="cat_text">{{ cat.title }}</p>
                    </a></li>
                    {% endfor %}
                </ul>


            </div>


        </div>

    </div>
