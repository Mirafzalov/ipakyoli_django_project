<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>
</head>

<body style="margin:0; font-family:Arial, sans-serif; background:#f4f6f8;">

<div style="max-width:800px; margin:50px auto; padding:20px;">

    <h2 style="text-align:center; margin-bottom:20px;">
        Categories
    </h2>

    <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <a href="{% url 'add_category' %}"
           style="background:#2ecc71; color:white; padding:10px 15px;
                  border-radius:8px; text-decoration:none; font-size:14px;">
            + Add Category
        </a>
    </div>

    {% for c in categories %}
        <div style="background:white; padding:15px; margin-bottom:12px;
                    border-radius:10px; display:flex;
                    align-items:center; justify-content:space-between;
                    box-shadow:0 2px 6px rgba(0,0,0,0.08);">

            <!-- Left side -->
            <div style="display:flex; align-items:center; gap:10px;">
                <strong>{{ forloop.counter }}.</strong>
                <span>{{ c.title }}</span>

                {% if c.icon %}
                    <img src="{{ c.icon.url }}"
                         style="height:30px; width:30px;
                                object-fit:cover; border-radius:6px;"
                         alt="">
                {% endif %}
            </div>

            <!-- Right side buttons -->
            <div style="display:flex; gap:8px;">

                <a href="{% url 'category_detail' id=c.id %}"
                   style="background:#3498db; color:white;
                          padding:8px 12px; border-radius:8px;
                          text-decoration:none; font-size:13px;">
                    Edit
                </a>

                <a href="{% url 'delete_category' id=c.id %}"
                   style="background:#e74c3c; color:white;
                          padding:8px 12px; border-radius:8px;
                          text-decoration:none; font-size:13px;">
                    Delete
                </a>

            </div>

        </div>
    {% empty %}
        <div style="text-align:center; color:#777; margin-top:30px;">
            No categories found
        </div>
    {% endfor %}

</div>

</body>
</html>
